<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Votre voyage</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #ededed; display: flex; justify-content: center; }

        .phone-container {
            width: 100%; max-width: 450px; height: 100vh;
            background-color: #ededed; display: flex; flex-direction: column;
        }

        .ticket-container { padding: 20px; }
        
        /* Conteneur de la carte */
        .ticket-card {
            width: 100%;
            aspect-ratio: 702 / 433;
            background-image: url('image centrale.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Le bandeau noir semi-transparent comme l'original */
        .timer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 38%; /* Hauteur du bandeau noir */
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding-top: 5px;
        }

        .label-validite {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .countdown {
            font-size: 32px; /* Taille affinée pour coller à l'original */
            font-weight: 600;
            font-family: 'Roboto Condensed', sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="ticket-container">
        <div class="ticket-card">
            <div class="timer-overlay">
                <div class="label-validite">FIN DE VALIDITÉ:</div>
                <div class="countdown" id="countdownTimer">01:28:59</div>
            </div>
        </div>
    </div>
</div>

<script>
    let totalSeconds = 5339; // 01:28:59
    function updateCountdown() {
        totalSeconds--;
        let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
        let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
        let s = (totalSeconds % 60).toString().padStart(2, '0');
        document.getElementById('countdownTimer').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
